<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <script>
      (function(l) {
        if (l.search[1] === 'p') {
          var parts = l.search.slice(1).split('&');
          var path = parts[0].slice(2).replace(/~and~/g, '&');
          var query = parts[1] ? '?' + parts[1].slice(2).replace(/~and~/g, '&') : '';
          history.replaceState(null, null, l.pathname + path + query + l.hash);
        }
      }(window.location));
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTL — Human Touch Layer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
